name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        # Install only core syntax/mock imports without GPU/weights
        pip install fastapi uvicorn python-multipart python-dotenv pyyaml numpy qdrant-client

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Run Syntax Smoke Test
      run: |
        PYTHONPATH=. python scripts/smoke_test.py
